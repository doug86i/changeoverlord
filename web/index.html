<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changeoverlord</title>
  </head>
  <body>
    <script>
      (function(){try{var t=localStorage.getItem("changeoverlord-theme");if(t==="light"||t==="dark"){document.documentElement.dataset.theme=t}else{document.documentElement.dataset.theme=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"}}catch(e){document.documentElement.dataset.theme="light"}})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
