# Default: pull pre-built app from GHCR (built by GitHub Actions from this repo).
# Local dev: docker compose up --build
#
# All persistent data lives under DATA_DIR (default ./data) — one tree for backups / extra disk.
# See data/README.md

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stageops
      POSTGRES_PASSWORD: stageops
      POSTGRES_DB: stageops
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stageops -d stageops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfilename appendonly.aof
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/doug86i/changeoverlord/app:latest
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ${DATA_DIR:-./data}/uploads:/var/changeoverlord/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
