# =============================================================================
# Changeoverlord — production Compose (Linux / macOS / Windows + Docker Desktop).
#
# Deploy / show laptop (pre-built app image from GHCR — no local Dockerfile build):
#   cp .env.example .env    # optional: HOST_PORT, DATA_DIR, SESSION_SECRET, …
#   docker compose pull && docker compose up -d
#
# Develop from source: use **`make dev`** (merges **`docker-compose.dev.yml`** for `build: .`)
# or: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build`
#
# Compose loads `.env` from this directory if present. App behaviour (auth,
# branding, etc.) is configured in the UI — only infrastructure here.
#
# Variable          Default     Purpose
# ----------------  ----------  -----------------------------------------------
# DATA_DIR          ./data      Host root for db/, uploads/ (and fast-stack logs/ — one backup tree).
# HOST_PORT         80          Published HTTP port (e.g. 8080 if 80 is busy or restricted).
# APP_IMAGE_TAG     latest      Local/GHCR image tag for the app.
# LOG_LEVEL         debug       Default for local `make dev`; set `info` in `.env` for quiet LAN deploys — docs/LOGGING.md
# SESSION_SECRET    (generate)  HMAC for session cookie — set in production
#
# Paths: use forward slashes. Relative paths are relative to this file. On Windows,
# Docker accepts C:/path or ./path — avoid mixing styles in one value.
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: stageops
      POSTGRES_PASSWORD: stageops
      POSTGRES_DB: stageops
    volumes:
      - ${DATA_DIR:-./data}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stageops -d stageops"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/doug86i/changeoverlord/app:${APP_IMAGE_TAG:-latest}
    pull_policy: missing
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stageops:stageops@db:5432/stageops
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-generate-a-long-random-string}
      PORT: "80"
      WEB_PUBLIC_DIR: /app/public
      UPLOADS_DIR: /var/changeoverlord/uploads
      NODE_ENV: production
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ${DATA_DIR:-./data}/uploads:/var/changeoverlord/uploads
    depends_on:
      db:
        condition: service_healthy
    init: true
    stop_grace_period: 15s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
